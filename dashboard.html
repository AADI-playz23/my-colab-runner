<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevBox Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0d1117; color: #c9d1d9; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { border-bottom: 1px solid #30363d; padding-bottom: 10px; }
        .notebook-list { list-style: none; padding: 0; }
        .notebook-item { background: #161b22; border: 1px solid #30363d; margin-bottom: 10px; padding: 15px; border-radius: 6px; display: flex; justify-content: space-between; align-items: center; }
        .notebook-title { font-size: 1.2em; font-weight: bold; color: #58a6ff; text-decoration: none; }
        .notebook-title:hover { text-decoration: underline; }
        .btn { background: #238636; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 14px; }
        .btn:hover { background: #2ea043; }
        .btn-danger { background: #da3633; }
        .btn-danger:hover { background: #f85149; }
        .header-actions { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        #auth-status { color: #8b949e; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-actions">
            <h1>My Notebooks</h1>
            <div>
                <span id="auth-status"></span>
                <button class="btn" onclick="createNotebook()">+ New Notebook</button>
            </div>
        </div>
        <ul class="notebook-list" id="list"></ul>
    </div>

    <script>
        const username = localStorage.getItem('username');
        if (!username) {
            window.location.href = 'devbox_login.html';
        } else {
            document.getElementById('auth-status').innerText = 'Logged in as ' + username;
        }

        function loadNotebooks() {
            const list = document.getElementById('list');
            list.innerHTML = '';
            const notebooks = JSON.parse(localStorage.getItem('notebooks') || '[]');
            
            if (notebooks.length === 0) {
                list.innerHTML = '<li>No notebooks found. Create one!</li>';
            }

            notebooks.forEach(nb => {
                const li = document.createElement('li');
                li.className = 'notebook-item';
                
                // For simplicity, we just link to ide.html with the ID
                li.innerHTML = `
                    <a href="ide.html?id=${nb.id}" class="notebook-title">${nb.name}</a>
                    <span>
                        <small style="color:#8b949e; margin-right: 15px;">Last modified: ${new Date(nb.updatedAt).toLocaleString()}</small>
                        <button class="btn btn-danger" onclick="deleteNotebook('${nb.id}')">Delete</button>
                    </span>
                `;
                list.appendChild(li);
            });
        }

        function createNotebook() {
            const name = prompt("Enter notebook name:");
            if (!name) return;
            
            const notebooks = JSON.parse(localStorage.getItem('notebooks') || '[]');
            const id = 'nb_' + Date.now();
            notebooks.push({
                id: id,
                name: name,
                cells: [],
                updatedAt: Date.now()
            });
            localStorage.setItem('notebooks', JSON.stringify(notebooks));
            loadNotebooks();
        }

        function deleteNotebook(id) {
            if (!confirm("Are you sure you want to delete this notebook?")) return;
            let notebooks = JSON.parse(localStorage.getItem('notebooks') || '[]');
            notebooks = notebooks.filter(nb => nb.id !== id);
            localStorage.setItem('notebooks', JSON.stringify(notebooks));
            loadNotebooks();
        }

        loadNotebooks();
    </script>
</body>
</html>
