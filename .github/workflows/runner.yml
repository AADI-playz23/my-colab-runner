name: DevBox Runner

on:
  repository_dispatch:
    types: [run-code]

jobs:
  execute:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Execute User Code
        id: run_script
        run: |
          # 1. Create a safe script file
          echo "${{ github.event.client_payload.code }}" > script.sh
          chmod +x script.sh
          
          # 2. Run it and save output to a temp file
          # We capture both Standard Output (STDOUT) and Errors (STDERR)
          ./script.sh > output.txt 2>&1 || true
          
          # 3. Read content for next step
          CONTENT=$(cat output.txt)
          echo "OUTPUT<<EOF" >> $GITHUB_ENV
          echo "$CONTENT" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Save Result to Repo
        run: |
          # Configure Git
          git config --global user.name "DevBox Bot"
          git config --global user.email "bot@devbox.local"
          
          # Create outputs folder if missing
          mkdir -p outputs
          
          # Save result using the specific Run ID
          cp output.txt outputs/${{ github.event.client_payload.run_id }}.txt
          
          # Commit and Push
          git add outputs/
          git commit -m "Result for ${{ github.event.client_payload.run_id }}"
          git push
