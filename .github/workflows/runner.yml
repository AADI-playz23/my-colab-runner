name: Turbo Runner

on:
  repository_dispatch:
    types: [run-code]

jobs:
  execute:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # OPTIMIZATION: We REMOVED "checkout". We don't need to download the repo to run a script.
      
      - name: Run & Upload
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 1. Prepare Script
          echo "${{ github.event.client_payload.code }}" > script.sh
          chmod +x script.sh
          
          # 2. Run Code (Capture Output)
          ./script.sh > output.txt 2>&1 || true
          
          # 3. TURBO UPLOAD (Direct API Call)
          # Instead of slow 'git push', we use the GitHub CLI (gh) to upload instantly.
          
          CONTENT=$(base64 -w 0 output.txt)
          
          gh api --method PUT \
            /repos/${{ github.repository }}/contents/outputs/${{ github.event.client_payload.run_id }}.txt \
            -f message="Fast Result" \
            -f content="$CONTENT" \
            -f encoding="base64"
