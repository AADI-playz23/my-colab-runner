<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevBox IDE</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        body { 
            font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            height: 100vh;
            color: #e6edf3;
            background: linear-gradient(-45deg, #0d1117, #161b22, #0d1520, #0a0c10);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Glassmorphism Classes */
        .glass {
            background: rgba(22, 27, 34, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }
        .glass-panel {
            background: rgba(13, 17, 23, 0.5);
            backdrop-filter: blur(8px);
        }

        .header { 
            padding: 12px 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid rgba(255,255,255,0.1);
            z-index: 10;
        }
        .notebook-title { font-size: 1.2em; font-weight: 600; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        .status { padding: 4px 10px; border-radius: 6px; font-size: 0.85em; font-weight: 500; }
        .status.active { background: rgba(35, 134, 54, 0.8); box-shadow: 0 0 10px rgba(35, 134, 54, 0.4); border: 1px solid rgba(46, 160, 67, 0.5); color: white;}
        .status.queued { background: rgba(210, 153, 34, 0.8); color: #000; box-shadow: 0 0 10px rgba(210, 153, 34, 0.4); border: 1px solid rgba(210, 153, 34, 0.8); }
        .status.error { background: rgba(218, 54, 51, 0.8); box-shadow: 0 0 10px rgba(218, 54, 51, 0.4); border: 1px solid rgba(248, 81, 73, 0.5); color: white;}
        
        .toolbar { 
            padding: 10px 20px; 
            display: flex; 
            gap: 10px; 
            align-items: center; 
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .btn { 
            background: rgba(33, 38, 45, 0.6); 
            color: #c9d1d9; 
            border: 1px solid rgba(255,255,255,0.1); 
            padding: 6px 14px; 
            border-radius: 6px; 
            cursor: pointer; 
            font-size: 13px; 
            font-weight: 500;
            transition: all 0.2s ease;
        }
        .btn:hover:not(:disabled) { background: rgba(48, 54, 61, 0.8); border-color: rgba(255,255,255,0.2); box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .btn-run { background: rgba(35, 134, 54, 0.8); border: 1px solid rgba(46, 160, 67, 0.5); color: white;}
        .btn-run:hover:not(:disabled) { background: rgba(46, 160, 67, 0.9); box-shadow: 0 0 12px rgba(46, 160, 67, 0.4); }
        .btn-connect { background: rgba(31, 111, 235, 0.8); border: 1px solid rgba(56, 139, 253, 0.5); color: white;}
        .btn-connect:hover:not(:disabled) { background: rgba(56, 139, 253, 0.9); box-shadow: 0 0 12px rgba(56, 139, 253, 0.4); }
        .btn-disconnect { background: rgba(218, 54, 51, 0.8); border: 1px solid rgba(248, 81, 73, 0.5); color: white;}
        .btn-disconnect:hover:not(:disabled) { background: rgba(248, 81, 73, 0.9); box-shadow: 0 0 12px rgba(248, 81, 73, 0.4); }
        .toolbar-separator { width: 1px; height: 24px; background: rgba(255,255,255,0.1); margin: 0 8px; }
        
        .main-container { display: flex; flex: 1; overflow: hidden; }
        
        .file-manager { 
            width: 260px; 
            border-right: 1px solid rgba(255,255,255,0.08); 
            display: flex; 
            flex-direction: column; 
        }
        .fm-header { padding: 12px 15px; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between; align-items: center; font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: #8b949e; }
        .fm-btn { background: none; border: none; color: #8b949e; cursor: pointer; font-size: 16px; padding: 4px; border-radius: 4px; transition: all 0.2s; }
        .fm-btn:hover { color: #fff; background: rgba(255,255,255,0.1); }
        .file-tree { flex: 1; overflow-y: auto; padding: 10px 0; }
        .file-item { padding: 6px 15px; cursor: pointer; display: flex; justify-content: space-between; font-size: 13px; color: #c9d1d9; transition: background 0.1s; }
        .file-item:hover { background: rgba(255,255,255,0.05); }
        .file-item-name { display: flex; align-items: center; gap: 8px; }
        .file-item-actions { display: none; }
        .file-item:hover .file-item-actions { display: block; }

        .content { flex: 1; padding: 30px; overflow-y: auto; display: flex; flex-direction: column; align-items: center; }
        #cells-container { width: 100%; max-width: 900px; display: flex; flex-direction: column; gap: 20px; }
        
        .cell { 
            width: 100%;
            border-radius: 10px; 
            overflow: hidden; 
            transition: transform 0.2s, box-shadow 0.2s;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 2px 12px rgba(0,0,0,0.4);
        }
        .cell:focus-within {
            box-shadow: 0 0 0 1px rgba(56, 139, 253, 0.5), 0 8px 24px rgba(0,0,0,0.3);
            transform: translateY(-2px);
        }
        .cell-header { 
            background: rgba(0,0,0,0.2); 
            padding: 8px 15px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.05); 
            font-size: 13px; 
            color: #8b949e;
        }
        .cell-input { position: relative; }
        .cell-input textarea { 
            width: 100%; 
            min-height: 105px; 
            background: #0d1117; 
            color: #e6edf3; 
            border: none;
            border-top: 1px solid rgba(255,255,255,0.07);
            padding: 15px; 
            font-family: 'Consolas', 'Courier New', monospace; 
            font-size: 14px;
            resize: vertical; 
            box-sizing: border-box; 
            outline: none; 
            line-height: 1.5;
            display: block;
        }
        .cell-input textarea::placeholder {
            color: rgba(139, 148, 158, 0.5);
        }
        .cell-output { 
            background: #010409; 
            padding: 15px; 
            color: #39d353; 
            font-family: 'Consolas', 'Courier New', monospace; 
            white-space: pre-wrap; 
            word-wrap: break-word; 
            border-top: 1px solid rgba(57, 211, 83, 0.2); 
            font-size: 13px;
            line-height: 1.4;
            max-height: 364px;
            overflow-y: auto;
        }
        
        .md-view {
            padding: 15px 25px;
            background: rgba(13, 17, 23, 0.3);
            cursor: text;
            line-height: 1.6;
            color: #c9d1d9;
        }
        .md-view h1, .md-view h2, .md-view h3 { margin-top: 0; color: #e6edf3; }
        .md-view code { background: rgba(255,255,255,0.1); padding: 2px 6px; border-radius: 4px; font-family: monospace; }
        .md-view pre { background: rgba(1, 4, 9, 0.8); padding: 15px; border-radius: 6px; overflow-x: auto; border: 1px solid rgba(255,255,255,0.05); }

        /* Custom Scrollbars */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: rgba(0, 0, 0, 0.2); }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.3); }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); z-index: 1000; align-items: center; justify-content: center; }
        .editor-modal { width: 80%; height: 80%; border-radius: 12px; display: flex; flex-direction: column; overflow: hidden; }
        .editor-header { padding: 15px 20px; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-between; align-items: center; font-family: monospace; font-size: 14px; background: rgba(0,0,0,0.2); }
        .editor-textarea { flex: 1; background: rgba(13, 17, 23, 0.7); color: #e6edf3; border: none; padding: 20px; font-family: 'Consolas', monospace; font-size: 14px; resize: none; outline: none; line-height: 1.5; }
    </style>
</head>
<body>
    <div class="header glass">
        <div>
            <a href="dashboard.html" style="color: #58a6ff; text-decoration: none; margin-right: 15px;">&larr; Dashboard</a>
            <span class="notebook-title" id="nb-title">Loading...</span>
        </div>
            <span id="plan-badge" class="status" style="margin-right: 15px; background: #1f6feb; display: none;"></span>
            <span id="usage-stats" style="margin-right: 15px; font-family: monospace; color: #8b949e; display: none;"></span>
            <span id="session-timer" style="margin-right: 15px; font-family: monospace;"></span>
            <span class="status" id="status-badge">Not Connected</span>
            <button onclick="window.location.href='dashboard.html'" style="margin-left: 15px; background: #21262d; border: 1px solid #30363d; color: #c9d1d9; border-radius: 4px; padding: 2px 10px; cursor: pointer;">Exit</button>
        </div>
    </div>
    
    <div class="toolbar glass-panel">
        <button class="btn btn-connect" onclick="startSession()" id="btn-connect">⚡ Connect to Runtime</button>
        <button class="btn btn-disconnect" onclick="disconnectSession()" id="btn-disconnect" style="display: none;">⏹ Disconnect</button>
        <div class="toolbar-separator"></div>
        <button class="btn" onclick="addCell('bash')">+ Code</button>
        <button class="btn" onclick="addCell('markdown')">+ Text</button>
        <button class="btn btn-run" onclick="runAllCells()" id="btn-run-all">▶ Run All</button>
        <button class="btn" onclick="saveNotebook()">Save Notebook</button>
    </div>

    <div class="main-container">
        <!-- File Manager Sidebar -->
        <div class="file-manager glass-panel">
            <div class="fm-header">
                <span>File Explorer</span>
                <div>
                    <button class="fm-btn" onclick="refreshFiles()" title="Refresh">↻</button>
                    <button class="fm-btn" onclick="newFile()" title="New File">📄</button>
                    <button class="fm-btn" onclick="newFolder()" title="New Folder">📁</button>
                </div>
            </div>
            <div class="file-tree" id="file-tree">
                <div style="padding: 20px 10px; color: #8b949e; font-size: 12px; text-align: center;">Connect to a runtime to browse files</div>
            </div>
        </div>

        <!-- Notebook Content -->
        <div class="content" id="cells-container">
            <!-- Cells go here -->
        </div>
    </div>

    <!-- File Editor Modal -->
    <div class="modal-overlay" id="editor-modal">
        <div class="editor-modal glass">
            <div class="editor-header">
                <span id="editor-filename">filename.txt</span>
                <div style="display: flex; gap: 10px;">
                    <button class="btn btn-run" onclick="saveFile()">Save</button>
                    <button class="btn" onclick="closeEditor()">Close</button>
                </div>
            </div>
            <textarea class="editor-textarea" id="editor-textarea" spellcheck="false"></textarea>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const nbId = urlParams.get('id');
        const username = localStorage.getItem('username');
        
        let notebook = null;
        let sessionId = null;
        let userPlan = 'free';
        let sessionTimerInterval = null;
        let sessionTimeoutSecs = 0;
        let sessionStartedAt = null;
        let workerWs = null;
        let isConnecting = false;
        
        let activeCellId = null;
        let runQueue = [];
        let isRunningQueue = false;
        
        let currentPath = '/';
        let currentEditingFile = null;

        if (!username || !nbId) {
            window.location.href = 'dashboard.html';
        }

        // ---------- Notebook Logic ----------

        function loadNotebook() {
            const notebooks = JSON.parse(localStorage.getItem('notebooks') || '[]');
            notebook = notebooks.find(n => n.id === nbId);
            if (!notebook) {
                alert("Notebook not found");
                window.location.href = 'dashboard.html';
                return;
            }
            document.getElementById('nb-title').innerText = notebook.name;
            
            if (!notebook.cells) notebook.cells = [];
            if (notebook.cells.length === 0) addCell();
            else renderCells();
        }

        function saveNotebook() {
            if (!notebook) return;
            document.querySelectorAll('.cell').forEach(el => {
                const id = el.dataset.id;
                const code = el.querySelector('textarea') ? el.querySelector('textarea').value : null;
                const cell = notebook.cells.find(c => c.id === id);
                if (cell && code !== null) cell.code = code;
            });
            notebook.updatedAt = Date.now();
            
            const notebooks = JSON.parse(localStorage.getItem('notebooks') || '[]');
            const idx = notebooks.findIndex(n => n.id === nbId);
            if (idx !== -1) {
                notebooks[idx] = notebook;
                localStorage.setItem('notebooks', JSON.stringify(notebooks));
            }
            console.log("Saved Notebook.");
        }

        function addCell(type = 'bash') {
            const cellId = 'cell_' + Date.now();
            notebook.cells.push({ id: cellId, type: type, code: '', viewMode: false });
            renderCells();
            saveNotebook();
        }

        function deleteCell(id) {
            notebook.cells = notebook.cells.filter(c => c.id !== id);
            renderCells();
            saveNotebook();
        }

        function isRuntimeConnected() {
            return sessionId && workerWs && workerWs.readyState === WebSocket.OPEN;
        }

        function renderCells() {
            const container = document.getElementById('cells-container');
            container.innerHTML = '';
            notebook.cells.forEach((cell, idx) => {
                const isMd = cell.type === 'markdown';
                const div = document.createElement('div');
                div.className = 'cell glass-panel';
                div.dataset.id = cell.id;
                
                let inner = `
                    <div class="cell-header">
                        <span>[${idx + 1}] ${isMd ? 'Markdown' : 'Bash'}</span>
                        <div style="display: flex; gap: 8px;">
                            ${isMd && cell.viewMode ? `<button class="btn" onclick="editMarkdown('${cell.id}')">Edit</button>` : `<button class="btn btn-run" onclick="runCell('${cell.id}')">${isMd ? 'Render' : 'Run'}</button>`}
                            <button class="btn" onclick="deleteCell('${cell.id}')">Delete</button>
                        </div>
                    </div>
                `;
                
                if (isMd && cell.viewMode) {
                    const html = marked.parse(cell.code || '*Empty text cell*');
                    inner += `<div class="md-view" ondblclick="editMarkdown('${cell.id}')">${html}</div>`;
                } else {
                    inner += `
                        <div class="cell-input">
                            <textarea spellcheck="false" placeholder="${isMd ? 'Enter markdown here...' : 'Enter bash command...'}">${cell.code}</textarea>
                        </div>
                    `;
                }
                
                if (!isMd) {
                    inner += `<div class="cell-output" id="out_${cell.id}" style="display: none;"></div>`;
                }
                
                div.innerHTML = inner;
                container.appendChild(div);
            });
        }

        function editMarkdown(cellId) {
            const cell = notebook.cells.find(c => c.id === cellId);
            if (cell) {
                cell.viewMode = false;
                renderCells();
            }
        }

        function runCell(cellId) {
            saveNotebook();
            const cell = notebook.cells.find(c => c.id === cellId);
            if (!cell || !cell.code.trim()) return;
            
            if (cell.type === 'markdown') {
                cell.viewMode = true;
                renderCells();
                return;
            }

            if (!isRuntimeConnected()) {
                alert("Not connected to a runtime. Click '⚡ Connect to Runtime' first.");
                return;
            }
            
            const outDiv = document.getElementById('out_' + cellId);
            outDiv.style.display = 'block';
            outDiv.innerText = 'Running...\n';

            activeCellId = cellId;
            workerWs.send(JSON.stringify({
                type: 'command',
                cell_id: cellId,
                command: cell.code
            }));
        }

        function runAllCells() {
            if (!isRuntimeConnected()) {
                alert("Not connected to a runtime. Click '⚡ Connect to Runtime' first.");
                return;
            }
            saveNotebook();
            runQueue = notebook.cells.filter(c => c.code.trim() && c.type !== 'markdown').map(c => c.id);
            if (runQueue.length === 0) return;
            if (!isRunningQueue) {
                processRunQueue();
            }
        }

        function processRunQueue() {
            if (runQueue.length === 0) {
                isRunningQueue = false;
                document.getElementById('btn-run-all').innerText = "▶ Run All";
                return;
            }
            isRunningQueue = true;
            document.getElementById('btn-run-all').innerText = "Running...";
            const cellId = runQueue.shift();
            runCell(cellId);
        }

        // ---------- UI State Helpers ----------

        function setConnectedUI() {
            document.getElementById('btn-connect').style.display = 'none';
            document.getElementById('btn-disconnect').style.display = '';
        }

        function setDisconnectedUI() {
            document.getElementById('btn-connect').style.display = '';
            document.getElementById('btn-connect').innerText = '⚡ Connect to Runtime';
            document.getElementById('btn-connect').disabled = false;
            document.getElementById('btn-disconnect').style.display = 'none';

            document.getElementById('session-timer').innerText = '';
            document.getElementById('usage-stats').style.display = 'none';
            document.getElementById('file-tree').innerHTML = '<div style="padding: 20px 10px; color: #8b949e; font-size: 12px; text-align: center;">Connect to a runtime to browse files</div>';
            isConnecting = false;
        }

        // ---------- Session Logic ----------

        function updateStatus(status, text) {
            const badge = document.getElementById('status-badge');
            badge.className = 'status ' + status;
            badge.innerText = text;
        }

        async function startSession() {
            if (isConnecting) return;
            isConnecting = true;
            
            const connectBtn = document.getElementById('btn-connect');
            connectBtn.innerText = '⏳ Connecting...';
            connectBtn.disabled = true;
            updateStatus('', 'Starting...');
            
            try {
                const res = await fetch('/api/start_session', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username })
                }).then(r => r.json());

                if (res.status === 'error') {
                    updateStatus('error', res.message);
                    setDisconnectedUI();
                    return;
                }

                sessionId = res.session_id;
                sessionTimeoutSecs = res.session_limit_mins * 60;
                
                if (res.status === 'active' && res.worker_url) {
                    connectWorker(res.worker_url);
                    updateStatus('active', 'Online');
                    sessionStartedAt = res.started_at || Math.floor(Date.now() / 1000);
                    startTimer();
                    setConnectedUI();
                } else {
                    updateStatus('queued', res.status === 'booting' ? 'Booting VM...' : 'In Queue...');
                    pollSessionStatus();
                }
            } catch (e) {
                updateStatus('error', 'Failed to connect');
                setDisconnectedUI();
            }
        }

        function disconnectSession() {
            if (workerWs) {
                workerWs.close();
                workerWs = null;
            }
            sessionId = null;
            sessionStartedAt = null;
            if (sessionTimerInterval) {
                clearInterval(sessionTimerInterval);
                sessionTimerInterval = null;
            }
            // Cancel any running queue
            runQueue = [];
            isRunningQueue = false;
            activeCellId = null;
            
            updateStatus('', 'Not Connected');
            setDisconnectedUI();
        }

        async function pollSessionStatus() {
            if (!sessionId) return;
            try {
                const res = await fetch(`/api/session_status?id=${sessionId}`).then(r => r.json());
                if (res.status === 'success') {
                    if (res.session_status === 'queued' || res.session_status === 'running' || res.session_status === 'booting') {
                        updateStatus('queued', (res.session_status === 'running' || res.session_status === 'booting') ? 'Booting VM...' : 'In Queue...');
                        setTimeout(pollSessionStatus, 3000);
                    } else if (res.session_status === 'active') {
                        if (res.worker_url) {
                            connectWorker(res.worker_url);
                            updateStatus('active', 'Online');
                            sessionStartedAt = res.started_at || Math.floor(Date.now() / 1000);
                            startTimer();
                            setConnectedUI();
                        } else {
                            updateStatus('queued', 'Booting VM...');
                            setTimeout(pollSessionStatus, 3000);
                        }
                    } else if (res.session_status === 'expired' || res.session_status === 'closed') {
                        updateStatus('error', 'Session Ended');
                        disconnectSession();
                    }
                }
            } catch(e) {
                setTimeout(pollSessionStatus, 3000);
            }
        }

        function startTimer() {
            if (sessionTimerInterval) clearInterval(sessionTimerInterval);
            sessionTimerInterval = setInterval(() => {
                const now = Math.floor(Date.now() / 1000);
                const elapsed = now - sessionStartedAt;
                const remaining = sessionTimeoutSecs - elapsed;
                if (remaining <= 0) {
                    document.getElementById('session-timer').innerText = "00:00";
                    updateStatus('error', 'Session Expired');
                    clearInterval(sessionTimerInterval);
                    sessionTimerInterval = null;
                    disconnectSession();
                } else {
                    const m = Math.floor(remaining / 60).toString().padStart(2, '0');
                    const s = (remaining % 60).toString().padStart(2, '0');
                    document.getElementById('session-timer').innerText = `${m}:${s} remaining`;
                }
            }, 1000);
        }

        // ---------- WebSocket Logic ----------

        function connectWorker(url) {
            if (workerWs) {
                try { workerWs.close(); } catch(e) {}
                workerWs = null;
            }
            
            workerWs = new WebSocket(url);
            workerWs.onopen = () => {
                workerWs.send(JSON.stringify({ type: 'auth', session_id: sessionId }));
                setTimeout(refreshFiles, 500); // load files
            };
            
            workerWs.onmessage = (e) => {
                try {
                    const data = JSON.parse(e.data);
                    
                    if (data.type === 'message') {
                        if (!activeCellId) return;
                        const outDiv = document.getElementById('out_' + activeCellId);
                        if (!outDiv) return;
                        
                        // Check for EOF magic string
                        if (data.data.includes(`__DEVBOX_EOF_${activeCellId}__`)) {
                            const cleanText = data.data.replace(`__DEVBOX_EOF_${activeCellId}__`, '').trim();
                            if (cleanText) {
                                if (outDiv.innerText === 'Running...\n') outDiv.innerText = '';
                                outDiv.innerText += cleanText;
                            }
                            activeCellId = null;
                            if (isRunningQueue) setTimeout(processRunQueue, 100);
                            return;
                        }
                        
                        if (outDiv.innerText === 'Running...\n') outDiv.innerText = '';
                        outDiv.innerText += data.data;
                        outDiv.scrollTop = outDiv.scrollHeight;
                        
                    } else if (data.type === 'usage') {
                        const usageEl = document.getElementById('usage-stats');
                        usageEl.style.display = 'inline';
                        usageEl.innerText = `Disk: ${data.disk_mb}MB / ${data.disk_max_mb}MB`;
                    } else if (data.type === 'dir_list') {
                        renderFileTree(data.items);
                    } else if (data.type === 'file_content') {
                        openEditor(data.path, data.content);
                    } else if (data.type === 'file_saved') {
                        alert("File saved!");
                        closeEditor();
                        refreshFiles();
                    } else if (data.type === 'file_error') {
                        alert("File Error: " + data.message);
                    }
                } catch (err) {}
            };
            
            workerWs.onclose = () => {
                workerWs = null;
                // Only show disconnected if we were actually connected (not a manual disconnect)
                if (sessionId) {
                    updateStatus('error', 'Disconnected from VM');
                    setDisconnectedUI();
                }
            };
        }

        // ---------- File Manager Logic ----------

        function refreshFiles() {
            if (isRuntimeConnected()) {
                workerWs.send(JSON.stringify({ type: 'list_dir', path: currentPath }));
            }
        }

        function renderFileTree(items) {
            const tree = document.getElementById('file-tree');
            tree.innerHTML = '';
            
            if (items.length === 0) {
                tree.innerHTML = '<div style="padding: 10px; color: #8b949e; font-size: 12px; text-align: center;">Empty directory</div>';
                return;
            }

            // Sort dirs first, then files
            items.sort((a, b) => {
                if (a.is_dir === b.is_dir) return a.name.localeCompare(b.name);
                return a.is_dir ? -1 : 1;
            });

            items.forEach(item => {
                const div = document.createElement('div');
                div.className = 'file-item';
                const icon = item.is_dir ? '📁' : '📄';
                div.innerHTML = `
                    <div class="file-item-name">
                        <span>${icon}</span>
                        <span>${item.name}</span>
                    </div>
                    <div class="file-item-actions">
                        <button class="fm-btn" onclick="event.stopPropagation(); deleteItem('${item.name}')" title="Delete">🗑</button>
                    </div>
                `;
                div.onclick = () => {
                    if (item.is_dir) {
                        // Navigate into folder
                        currentPath = currentPath + item.name + '/';
                        refreshFiles();
                    } else {
                        workerWs.send(JSON.stringify({ type: 'read_file', path: currentPath + item.name }));
                    }
                };
                tree.appendChild(div);
            });

            // Add ".. (go back)" if not at root
            if (currentPath !== '/') {
                const backDiv = document.createElement('div');
                backDiv.className = 'file-item';
                backDiv.innerHTML = `<div class="file-item-name"><span>⬆️</span><span>.. (parent folder)</span></div>`;
                backDiv.onclick = () => {
                    // Go up one directory
                    const parts = currentPath.replace(/\/$/, '').split('/');
                    parts.pop();
                    currentPath = parts.length <= 1 ? '/' : parts.join('/') + '/';
                    refreshFiles();
                };
                tree.prepend(backDiv);
            }
        }

        function newFile() {
            if (!isRuntimeConnected()) { alert("Not connected to a runtime."); return; }
            const name = prompt("Enter file name (e.g. script.py):");
            if (name && workerWs) {
                workerWs.send(JSON.stringify({ type: 'write_file', path: currentPath + name, content: "" }));
                setTimeout(refreshFiles, 500);
            }
        }

        function newFolder() {
            if (!isRuntimeConnected()) { alert("Not connected to a runtime."); return; }
            const name = prompt("Enter folder name:");
            if (name && workerWs) {
                workerWs.send(JSON.stringify({ type: 'create_folder', path: currentPath + name }));
                setTimeout(refreshFiles, 500);
            }
        }

        function deleteItem(name) {
            if (!isRuntimeConnected()) { alert("Not connected to a runtime."); return; }
            if (confirm(`Delete ${name}?`)) {
                workerWs.send(JSON.stringify({ type: 'delete_item', path: currentPath + name }));
                setTimeout(refreshFiles, 500);
            }
        }

        function openEditor(path, content) {
            currentEditingFile = path;
            document.getElementById('editor-filename').innerText = path;
            document.getElementById('editor-textarea').value = content;
            document.getElementById('editor-modal').style.display = 'flex';
        }

        function closeEditor() {
            currentEditingFile = null;
            document.getElementById('editor-modal').style.display = 'none';
        }

        function saveFile() {
            if (currentEditingFile && isRuntimeConnected()) {
                const content = document.getElementById('editor-textarea').value;
                workerWs.send(JSON.stringify({ type: 'write_file', path: currentEditingFile, content: content }));
            }
        }

        // Only load the notebook — do NOT auto-connect to runtime
        loadNotebook();
    </script>
</body>
</html>
