<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Absora DevBox - System Connection Tester</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0f172a; color: #f8fafc; padding: 40px; }
        .container { max-width: 800px; margin: 0 auto; background: #1e293b; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        h1 { margin-top: 0; color: #38bdf8; border-bottom: 1px solid #334155; padding-bottom: 15px; }
        .check-item { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid #334155; }
        .check-item:last-child { border-bottom: none; }
        .check-name { font-weight: bold; font-size: 18px; }
        .check-status { display: flex; align-items: center; gap: 10px; font-weight: bold; }
        .btn { padding: 10px 20px; background: #2563eb; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; margin-top: 20px; }
        .btn:hover { background: #1d4ed8; }
        
        .status-loading { color: #fbbf24; }
        .status-success { color: #4ade80; }
        .status-error { color: #f87171; }
        .error-msg { font-size: 12px; font-weight: normal; max-width: 300px; text-align: right; }
    </style>
</head>
<body>

<div class="container">
    <h1>System Connection Tester</h1>
    <p>Run this tool to verify that all your Vercel Environment Variables and APIs are correctly configured.</p>
    
    <div class="check-item">
        <div class="check-name">1. PostgreSQL Database Connection</div>
        <div class="check-status" id="status-db">Not Tested</div>
    </div>
    
    <div class="check-item">
        <div class="check-name">2. Upstash Redis (Vercel KV) Connection</div>
        <div class="check-status" id="status-kv">Not Tested</div>
    </div>
    
    <div class="check-item">
        <div class="check-name">3. GitHub API Connection (GITHUB_TOKEN)</div>
        <div class="check-status" id="status-github">Not Tested</div>
    </div>

    <button class="btn" onclick="runTests()">Run All Connection Tests</button>
</div>

<script>
    async function testEndpoint(endpoint, elementId) {
        const el = document.getElementById(elementId);
        el.innerHTML = '<span class="status-loading">Testing...</span>';
        try {
            const res = await fetch(endpoint);
            const data = await res.json();
            if (res.ok && data.status === 'success') {
                el.innerHTML = `<span class="status-success">✅ Passed</span>`;
            } else {
                el.innerHTML = `<span class="status-error">❌ Failed</span><br><span class="error-msg">${data.message || 'Unknown error'}</span>`;
            }
        } catch (e) {
            el.innerHTML = `<span class="status-error">❌ Failed</span><br><span class="error-msg">${e.message}</span>`;
        }
    }

    async function runTests() {
        testEndpoint('/api/test_db', 'status-db');
        testEndpoint('/api/test_kv', 'status-kv');
        testEndpoint('/api/test_github', 'status-github');
    }
</script>

</body>
</html>
